<div
  class="modal fade"
  id="exampleModalToggle"
  aria-hidden="true"
  aria-labelledby="exampleModalToggleLabel"
  tabindex="-1"
>
<div class="modal-dialog modal-dialog-centered">
  <div class="modal-content">
    <div class="modal-header">
      <p class="titulo" id="exampleModalToggleLabel">Iniciar Sesion o Registrarse</p>
      
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <h2 class="bienvenido">Bienvenido a TurismoWeb</h2>

        <div class="mb-3">
          <label for="correoElectronico" class="form-label"
            >Correo Electrónico</label
          >
          <div class="input-group input-group-lg">
            <span class="input-group-text"
              ><i class="fa-solid fa-user"></i
            ></span>
            <input
              type="text"
              class="form-control"
              id="correoElectronico"
              placeholder="Correo Electrónico"
              required
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="contrasena" class="form-label">Contraseña</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"
              ><i class="fa-solid fa-lock"></i
            ></span>
            <input
              type="password"
              class="form-control"
              id="contrasena"
              placeholder="Contraseña"
              required
            />
          </div>
        </div>

        <button type="button" class="btn btn-primary" id="btn-iniciarsesion">
          Iniciar Sesión
        </button>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="registrar"
          data-bs-toggle="modal"
          data-bs-target="#exampleModal"
        >
          ¿No tienes una cuenta? Regístrate.
        </button>
      </div>
    </div>
  </div>
</div>
